<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 6 — Students Results</title>
    <meta name="description" content="Student results for Level 6 English class taught by SWE Gwargios Mouris Amin.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Base ───────────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --purple: #667eea;
            --violet: #764ba2;
            --green:  #2ecc71;
            --orange: #f39c12;
            --red:    #e74c3c;
            --wa:     #25D366;
            --wa-dark:#128C7E;
            --gray-light: #f7f5ff;
            --gray-border: #e8e8f0;
            --text-main: #2d2d3a;
            --text-soft: #888;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--purple) 0%, var(--violet) 100%);
            background-attachment: fixed;
            padding: clamp(16px, 4vw, 48px) clamp(8px, 3vw, 24px);
            min-height: 100vh;
            color: var(--text-main);
        }

        /* ── Container ──────────────────────────────────────────────── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            border-radius: clamp(12px, 2vw, 24px);
            padding: clamp(20px, 5vw, 48px);
            box-shadow: 0 24px 80px rgba(0,0,0,0.28);
            animation: slideUp 0.5s ease both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ─────────────────────────────────────────────────── */
        .header { text-align: center; margin-bottom: clamp(20px, 4vw, 36px); }

        h1 {
            font-size: clamp(26px, 6vw, 52px);
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .subtitle {
            color: var(--text-soft);
            font-size: clamp(12px, 2vw, 14px);
            margin-top: 6px;
            font-weight: 400;
        }

        /* ── Stats Bar ──────────────────────────────────────────────── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(8px, 2vw, 16px);
            margin-bottom: clamp(20px, 4vw, 32px);
        }

        .stat-card {
            background: var(--gray-light);
            border-radius: 14px;
            padding: clamp(12px, 2.5vw, 20px) clamp(10px, 2vw, 16px);
            text-align: center;
            border: 1px solid var(--gray-border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(102,126,234,0.18);
        }

        .stat-card .stat-value {
            font-size: clamp(22px, 5vw, 36px);
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .stat-card .stat-label {
            font-size: clamp(10px, 1.8vw, 13px);
            color: var(--text-soft);
            font-weight: 500;
            margin-top: 5px;
        }

        /* ── Search ─────────────────────────────────────────────────── */
        .search-wrapper {
            display: flex;
            align-items: center;
            gap: clamp(8px, 2vw, 14px);
            margin-bottom: clamp(16px, 3vw, 26px);
        }

        #searchInput {
            flex: 1;
            padding: clamp(10px, 2vw, 13px) clamp(14px, 3vw, 20px);
            border: 2px solid var(--gay-border, #e8e8f0);
            border-radius: 50px;
            font-size: clamp(13px, 2.5vw, 15px);
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            color: var(--text-main);
            background: var(--gray-light);
        }

        #searchInput:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 4px rgba(102,126,234,0.14);
            background: #fff;
        }

        #searchInput::placeholder { color: #bbb; }

        #studentCount {
            background: linear-gradient(135deg, var(--purple), var(--violet));
            color: #fff;
            padding: clamp(7px, 1.5vw, 10px) clamp(12px, 2.5vw, 18px);
            border-radius: 50px;
            font-size: clamp(11px, 2vw, 13px);
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── Table (desktop/tablet) ─────────────────────────────────── */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 14px;
            border: 1px solid var(--gray-border);
            margin-bottom: clamp(24px, 4vw, 40px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(13px, 2vw, 15px);
        }

        thead {
            background: linear-gradient(135deg, var(--purple) 0%, var(--violet) 100%);
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        th {
            padding: clamp(12px, 2vw, 18px) clamp(10px, 2vw, 14px);
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: clamp(10px, 1.5vw, 12px);
            user-select: none;
            white-space: nowrap;
        }

        th.sortable { cursor: pointer; transition: background 0.2s; }
        th.sortable:hover { background: rgba(255,255,255,0.15); }
        th .sort-icon { margin-left: 4px; opacity: 0.5; }
        th.asc  .sort-icon::after { content: ' ↑'; opacity: 1; }
        th.desc .sort-icon::after { content: ' ↓'; opacity: 1; }
        th:not(.asc):not(.desc) .sort-icon::after { content: ' ↕'; }

        td {
            padding: clamp(12px, 2vw, 16px) clamp(10px, 2vw, 14px);
            border-bottom: 1px solid #f2f0f9;
            vertical-align: middle;
        }

        tbody tr:last-child td { border-bottom: none; }

        tbody tr {
            transition: background 0.18s ease, transform 0.18s ease;
            animation: fadeRow 0.3s ease both;
        }

        @keyframes fadeRow {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        tbody tr:hover {
            background: var(--gray-light);
            transform: scale(1.005);
        }

        /* ── Score badge ────────────────────────────────────────────── */
        .score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: clamp(14px, 2.5vw, 17px);
            width: 44px;
            height: 44px;
            border-radius: 50%;
        }

        .score.high { background: rgba(46,204,113,0.12);  color: var(--green);  }
        .score.mid  { background: rgba(243,156,18,0.12);  color: var(--orange); }
        .score.low  { background: rgba(231,76,60,0.12);   color: var(--red);    }

        /* ── Class badge ────────────────────────────────────────────── */
        .class-badge {
            background: linear-gradient(135deg, var(--purple), var(--violet));
            color: #fff;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: clamp(11px, 1.8vw, 13px);
            font-weight: 600;
            display: inline-block;
        }

        /* ── Rank badge ─────────────────────────────────────────────── */
        .rank { font-weight: 600; color: var(--text-soft); }
        .rank-1 { color: #f1c40f; font-size: 1.3em; }
        .rank-2 { color: #bdc3c7; font-size: 1.2em; }
        .rank-3 { color: #cd7f32; font-size: 1.15em; }

        /* ── WhatsApp ───────────────────────────────────────────────── */
        a.wa-link {
            color: var(--wa);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s, transform 0.2s;
            font-size: clamp(12px, 2vw, 14px);
        }

        a.wa-link:hover { color: var(--wa-dark); transform: scale(1.06); }

        a.wa-link svg {
            width: clamp(15px, 2.5vw, 18px);
            height: clamp(15px, 2.5vw, 18px);
            fill: currentColor;
            flex-shrink: 0;
        }

        .no-data { color: #ccc; font-style: italic; font-size: 12px; }

        /* ── No results ─────────────────────────────────────────────── */
        #noResults {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--text-soft);
            font-size: 15px;
        }

        /* ── Mobile Cards ───────────────────────────────────────────── */
        .cards-list { display: none; margin-bottom: clamp(24px, 4vw, 40px); }

        .student-card {
            background: #fff;
            border: 1px solid var(--gray-border);
            border-radius: 16px;
            padding: 18px 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(102,126,234,0.08);
            animation: fadeRow 0.3s ease both;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

        .student-card:active {
            transform: scale(0.98);
        }

        .student-card:hover {
            box-shadow: 0 6px 24px rgba(102,126,234,0.18);
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .card-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-main);
        }

        .card-rank-score {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 13px;
        }

        .card-field label {
            color: var(--text-soft);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 3px;
        }

        .card-field span, .card-field a {
            font-weight: 500;
            font-size: 13px;
        }

        .card-wa { grid-column: 1 / -1; }

        /* ── HR ─────────────────────────────────────────────────────── */
        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--purple), transparent);
            margin: clamp(24px, 4vw, 40px) 0;
        }

        /* ── Instructor ─────────────────────────────────────────────── */
        .instructor {
            background: linear-gradient(135deg, var(--purple) 0%, var(--violet) 100%);
            padding: clamp(20px, 4vw, 32px);
            border-radius: 18px;
            color: #fff;
            text-align: center;
        }

        .instructor h2 {
            margin-bottom: 12px;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: 700;
        }

        .instructor p {
            font-size: clamp(14px, 2.5vw, 17px);
            margin: 8px 0;
        }

        .instructor a.wa-link {
            color: #FFD700;
            font-size: clamp(15px, 3vw, 20px);
            font-weight: 700;
        }

        .instructor a.wa-link:hover { color: #fff; }

        /* ── Responsive breakpoints ─────────────────────────────────── */

        /* Tablet: ≤768px — shrink table, no Parent/Guardian col */
        @media (max-width: 768px) {
            .table-wrapper { display: block; }
            table { min-width: 0; }
            th:nth-child(5), td:nth-child(5) { display: none; } /* hide Guardian */
        }

        /* Mobile: ≤540px — switch to cards */
        @media (max-width: 540px) {
            .table-wrapper { display: none; }
            .cards-list     { display: block; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <h1>📚 Level 6</h1>
        <p class="subtitle">Student Results — Academic Session 2025/2026</p>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
        <div class="stat-card">
            <div class="stat-value" id="statTotal">—</div>
            <div class="stat-label">Total Students</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statAvg">—</div>
            <div class="stat-label">Class Average</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statTop">—</div>
            <div class="stat-label">Top Score</div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="🔍  Search by student name…" oninput="filterTable()" autocomplete="off">
        <span id="studentCount"></span>
    </div>

    <!-- Desktop/Tablet Table -->
    <div class="table-wrapper">
        <table id="studentsTable">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col" class="sortable" onclick="sortTable(1)" id="col-name" >Student Name <span class="sort-icon"></span></th>
                    <th scope="col" class="sortable" onclick="sortTable(2)" id="col-score">Score <span class="sort-icon"></span></th>
                    <th scope="col" class="sortable" onclick="sortTable(3)" id="col-class">Class <span class="sort-icon"></span></th>
                    <th scope="col">Parent/Guardian</th>
                    <th scope="col">WhatsApp</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <p id="noResults">😕 No students found matching your search.</p>
    </div>

    <!-- Mobile Cards -->
    <div class="cards-list" id="cardsList">
        <p id="noResultsCards" style="display:none; text-align:center; padding:30px; color:#aaa;">😕 No students found.</p>
    </div>

    <hr>

    <!-- Instructor -->
    <div class="instructor">
        <h2>👨‍💻 Instructor</h2>
        <p><strong>SWE:</strong> Gwargios Mouris Amin</p>
        <p><strong>Phone &amp; WhatsApp:</strong>
            <a class="wa-link" href="https://wa.me/201278728387" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                01278728387
            </a>
        </p>
    </div>
</div>

<script>
    /* ── Data ─────────────────────────────────────────────────────── */
    const students = [
        { name: "Kirolos Samir",  score: 76, cls: 6, guardian: "Samir Iskander",  phone: "201280674100" },
        { name: "Veronia Malak",  score: 77, cls: 6, guardian: "Raheal",           phone: "201276109384" },
        { name: "Mariam Esam",    score: 70, cls: 6, guardian: "Maisa Adel",       phone: "201287715455" },
        { name: "Elaria Magdy",   score: 74, cls: 6, guardian: "Kristin Magdy",    phone: "201288328216" },
        { name: "Youana Sameh",   score: 67, cls: 6, guardian: "Sameh Soliman",    phone: "201280838321" },
        { name: "Marvy Mina",     score: 60, cls: 6, guardian: "Mary Morcos",      phone: "201550455190" },
        { name: "Elina Emad",     score: 71, cls: 6, guardian: "Marian Wageh",     phone: "201207921261" },
        { name: "Youana Hany",    score: 71, cls: 4, guardian: "Roaz",             phone: "201276161357" },
        { name: "Shenoda Mena",   score: 68, cls: 5, guardian: "Mina Yousef",      phone: "201274291696" },
        { name: "Yousef Wael",    score: 68, cls: 6, guardian: "Tahany",           phone: "201289935984" },
        { name: "Kiria Samir",    score: 78, cls: 4, guardian: "Samir Iskander",   phone: "201280674100" },
        { name: "Karas Hany",     score: 77, cls: 5, guardian: "Kirolos Hany",     phone: "201279209773" },
        { name: "Fady Karam",     score: 79, cls: 4, guardian: "Kirolos Karam",    phone: "201202569591" },
    ];

    /* ── Helpers ──────────────────────────────────────────────────── */
    const WA_SVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>`;

    function scoreClass(s) { return s >= 75 ? 'high' : s >= 65 ? 'mid' : 'low'; }

    function rankIcon(i) {
        if (i === 0) return '<span class="rank rank-1">🥇</span>';
        if (i === 1) return '<span class="rank rank-2">🥈</span>';
        if (i === 2) return '<span class="rank rank-3">🥉</span>';
        return `<span class="rank">${i + 1}</span>`;
    }

    function waLink(phone) {
        if (!phone) return '<span class="no-data">N/A</span>';
        const display = phone.replace(/^20/, '0');
        return `<a class="wa-link" href="https://wa.me/${phone}" target="_blank" rel="noopener">${WA_SVG} ${display}</a>`;
    }

    /* ── Stats ────────────────────────────────────────────────────── */
    function updateStats() {
        const total  = students.length;
        const avg    = (students.reduce((a,s) => a + s.score, 0) / total).toFixed(1);
        const top    = Math.max(...students.map(s => s.score));
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statAvg').textContent   = avg;
        document.getElementById('statTop').textContent   = top;
    }

    /* ── State ────────────────────────────────────────────────────── */
    // Sort by score descending by default so rank #1 = highest
    let sortState  = { col: 2, asc: false };
    let currentData = sortedByDefault();

    function sortedByDefault() {
        return [...students].sort((a, b) => b.score - a.score);
    }

    /* ── Render Table ─────────────────────────────────────────────── */
    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        const noRes = document.getElementById('noResults');
        if (data.length === 0) {
            tbody.innerHTML = '';
            noRes.style.display = 'block';
        } else {
            noRes.style.display = 'none';
            tbody.innerHTML = data.map((s, i) => `
                <tr>
                    <td>${rankIcon(i)}</td>
                    <td><strong>${s.name}</strong></td>
                    <td><span class="score ${scoreClass(s.score)}">${s.score}</span></td>
                    <td><span class="class-badge">${s.cls}</span></td>
                    <td>${s.guardian || '<span class="no-data">—</span>'}</td>
                    <td>${waLink(s.phone)}</td>
                </tr>`).join('');
        }
    }

    /* ── Render Cards (mobile) ────────────────────────────────────── */
    function renderCards(data) {
        const list  = document.getElementById('cardsList');
        const noRes = document.getElementById('noResultsCards');
        // Remove old cards (keep noResults element)
        list.querySelectorAll('.student-card').forEach(c => c.remove());

        if (data.length === 0) {
            noRes.style.display = 'block';
        } else {
            noRes.style.display = 'none';
            data.forEach((s, i) => {
                const card = document.createElement('div');
                card.className = 'student-card';
                card.style.animationDelay = `${i * 0.04}s`;
                card.innerHTML = `
                    <div class="card-top">
                        <span class="card-name">${s.name}</span>
                        <div class="card-rank-score">
                            ${rankIcon(i)}
                            <span class="score ${scoreClass(s.score)}">${s.score}</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="card-field">
                            <label>Class</label>
                            <span class="class-badge">${s.cls}</span>
                        </div>
                        <div class="card-field">
                            <label>Guardian</label>
                            <span>${s.guardian || '<span class="no-data">—</span>'}</span>
                        </div>
                        <div class="card-field card-wa">
                            <label>WhatsApp</label>
                            ${waLink(s.phone)}
                        </div>
                    </div>`;
                list.appendChild(card);
            });
        }
    }

    function render(data) {
        renderTable(data);
        renderCards(data);
        document.getElementById('studentCount').textContent =
            `${data.length} / ${students.length} student${students.length !== 1 ? 's' : ''}`;
    }

    /* ── Search ───────────────────────────────────────────────────── */
    function filterTable() {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        currentData = sortedByDefault().filter(s => s.name.toLowerCase().includes(q));
        if (sortState.col !== -1) applySortToCurrentData();
        render(currentData);
    }

    /* ── Sort ─────────────────────────────────────────────────────── */
    const colMap = { 1: 'name', 2: 'score', 3: 'cls' };
    const colIds = { 1: 'col-name', 2: 'col-score', 3: 'col-class' };

    function sortTable(col) {
        sortState.asc = (sortState.col === col) ? !sortState.asc : true;
        sortState.col = col;
        document.querySelectorAll('th.sortable').forEach(th => th.classList.remove('asc','desc'));
        document.getElementById(colIds[col]).classList.add(sortState.asc ? 'asc' : 'desc');
        applySortToCurrentData();
        render(currentData);
    }

    function applySortToCurrentData() {
        const key = colMap[sortState.col];
        currentData.sort((a, b) => {
            const va = typeof a[key] === 'string' ? a[key].toLowerCase() : a[key];
            const vb = typeof b[key] === 'string' ? b[key].toLowerCase() : b[key];
            return sortState.asc ? (va < vb ? -1 : va > vb ? 1 : 0)
                                 : (va > vb ? -1 : va < vb ? 1 : 0);
        });
    }

    /* ── Init ─────────────────────────────────────────────────────── */
    // Mark score col as sorted desc by default
    document.getElementById('col-score').classList.add('desc');
    updateStats();
    render(currentData);
</script>
</body>
</html>
